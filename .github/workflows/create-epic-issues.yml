name: Create Epic Issues

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  create-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Create all epic issues
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 .github/scripts/create_issues.py \
            "${{ github.repository_owner }}" \
            "${{ github.event.repository.name }}" \
            "$GITHUB_TOKEN"
